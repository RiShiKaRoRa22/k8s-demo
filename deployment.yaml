apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: node-app

  template:
    metadata:
      labels:
        app: node-app

    spec:
      containers:
      - name: node-app
        image: k8s-demo:v2
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5000